<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Face-Secure Transaction</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>Secure Transaction Form</h1>

  <div class="form-container">
    <form method="POST" action="/verify">
      <label>Account No:</label>
      <input type="text" name="account" required><br><br>

      <label>Amount:</label>
      <input type="number" name="amount" required><br><br>

      <button type="submit">Proceed with Face Verification</button>
    </form>

    <!-- 👇 Live camera feed placed right below button -->
    <div class="camera-box">
      <img id="live-camera" src="{{ url_for('video_feed') }}" alt="Camera Feed">
    </div>
  </div>

</body>
</html>
